<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil do Corredor — Circuito Agenda Run</title>
  <meta property="og:title" content="Meu perfil no Circuito Agenda Run">
  <meta property="og:description" content="Veja meu ranking e histórico de corridas no Circuito Agenda Run.">
  <meta property="og:image" content="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', 'Segoe UI', sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; flex-direction: column; }
    h1, h2, h3, h4 { font-family: 'Barlow Condensed', sans-serif; }

    header { background: #0F2D4A; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid #E8622A; }
    header .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    header .logo img { height: 34px; }
    header .logo span { color: #fff; font-weight: 700; font-size: 15px; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.5px; }
    header a.btn-ranking { background: rgba(255,255,255,0.1); color: #fff; text-decoration: none; font-size: 13px; padding: 7px 14px; border-radius: 6px; }
    header a.btn-ranking:hover { background: rgba(255,255,255,0.2); }

    main { flex: 1; max-width: 680px; margin: 0 auto; padding: 32px 20px; width: 100%; }

    /* ── HERO DO PERFIL ── */
    .perfil-hero {
      background: #0F2D4A;
      border-radius: 14px;
      padding: 32px 28px;
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 20px;
      border-top: 3px solid #E8622A;
      flex-wrap: wrap;
    }
    .avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: #E8622A; color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 28px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .perfil-info { flex: 1; min-width: 160px; }
    .perfil-nome { font-size: 2rem; font-weight: 800; color: #fff; line-height: 1; letter-spacing: 0.5px; }
    .perfil-cidade { font-size: 13px; color: #a8c8e8; margin-top: 4px; }
    .perfil-instagram { margin-top: 6px; }
    .perfil-instagram a { color: #4CBFCB; font-size: 13px; font-weight: 600; text-decoration: none; }
    .perfil-instagram a:hover { text-decoration: underline; }

    /* ── STATS ── */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
    .stat-card {
      background: #fff; border-radius: 10px;
      padding: 18px 16px; text-align: center;
      border: 0.5px solid #e0e7ef;
    }
    .stat-num { font-family: 'Barlow Condensed', sans-serif; font-size: 2.2rem; font-weight: 800; color: #1F4E79; line-height: 1; }
    .stat-num.destaque { color: #E8622A; }
    .stat-label { font-size: 12px; color: #888; margin-top: 4px; line-height: 1.3; }

    /* ── TEMPORADA BADGE ── */
    .temporada-badge {
      display: inline-block; background: #E8622A; color: #fff;
      font-size: 11px; font-weight: 700; padding: 3px 10px;
      border-radius: 20px; letter-spacing: 0.5px; margin-top: 8px;
    }

    /* ── HISTÓRICO ── */
    .card { background: #fff; border-radius: 12px; border: 0.5px solid #e0e7ef; overflow: hidden; margin-bottom: 16px; }
    .card-header { padding: 16px 20px; border-bottom: 0.5px solid #e0e7ef; display: flex; align-items: center; justify-content: space-between; }
    .card-header h3 { font-size: 1.2rem; font-weight: 800; color: #1F4E79; letter-spacing: 0.3px; }
    .historico-table { width: 100%; border-collapse: collapse; }
    .historico-table th { font-size: 11px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; padding: 10px 20px; text-align: left; border-bottom: 0.5px solid #f0f0f0; }
    .historico-table td { padding: 13px 20px; font-size: 13px; border-bottom: 0.5px solid #f7f7f7; vertical-align: middle; }
    .historico-table tr:last-child td { border-bottom: none; }
    .historico-table tr:hover td { background: #fafbfc; }
    .ev-nome { font-weight: 600; color: #1a1a1a; }
    .ev-data { color: #888; font-size: 12px; margin-top: 2px; }
    .ev-dist { background: #EBF3FB; color: #1F4E79; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
    .pts-badge { font-family: 'Barlow Condensed', sans-serif; font-size: 1.1rem; font-weight: 800; color: #E8622A; }
    .empty-hist { text-align: center; padding: 32px; color: #aaa; font-size: 14px; }

    /* ── COMPARTILHAR ── */
    .share-box {
      background: #fff; border-radius: 12px; border: 0.5px solid #e0e7ef;
      padding: 20px; display: flex; align-items: center; gap: 14px;
      margin-bottom: 20px; flex-wrap: wrap;
    }
    .share-box p { font-size: 13px; color: #555; flex: 1; min-width: 160px; }
    .share-box p strong { color: #1F4E79; }
    .btn-share {
      background: #1F4E79; color: #fff; border: none; padding: 10px 20px;
      border-radius: 6px; font-size: 13px; font-weight: 700; cursor: pointer;
      font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; letter-spacing: 1px;
      white-space: nowrap;
    }
    .btn-share:hover { background: #0F2D4A; }
    .share-ok { font-size: 12px; color: #1a7a4a; margin-top: 4px; display: none; }

    /* ── SELO ASSINANTE ── */
    .selo-assinante { display: inline-flex; align-items: center; gap: 5px; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 800; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.5px; margin-top: 6px; }
    .selo-bronze { background: linear-gradient(135deg, #e8d5b7, #c8a87a); color: #6b4c1e; }
    .selo-prata  { background: linear-gradient(135deg, #d8e8f0, #a0c4d8); color: #1F4E79; }
    .selo-ouro   { background: linear-gradient(135deg, #fff3c0, #ffe066); color: #7a5800; }
    .selo-elite  { background: linear-gradient(135deg, #b8f0ff, #4CBFCB); color: #0a3d47; border: 1px solid #4CBFCB; }
    /* ── NOT FOUND ── */
    .not-found { text-align: center; padding: 60px 20px; color: #aaa; }
    .not-found h2 { font-size: 1.8rem; color: #1F4E79; margin-bottom: 12px; }
    .not-found p { font-size: 14px; margin-bottom: 24px; }
    .not-found a { color: #E8622A; font-weight: 700; text-decoration: none; }

    .loading { text-align: center; padding: 60px; color: #aaa; font-size: 14px; }

    footer { background: #0F2D4A; color: #7fa8c8; text-align: center; padding: 20px; font-size: 12px; }
    footer a { color: #4CBFCB; text-decoration: none; }

    @media (max-width: 520px) {
      .stats-row { grid-template-columns: repeat(3, 1fr); }
      .perfil-hero { padding: 20px; gap: 16px; }
      .perfil-nome { font-size: 1.6rem; }
      .historico-table th:nth-child(3), .historico-table td:nth-child(3) { display: none; }
    }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="logo">
    <img src="logo.png" alt="Agenda Run">
    <span>Circuito Agenda Run</span>
  </a>
  <a href="ranking.html" class="btn-ranking">🏆 Ranking</a>
</header>

<main id="main">
  <div class="loading">Carregando perfil...</div>
</main>

<footer>
  <a href="index.html">Circuito Agenda Run</a> · Grande São Paulo
</footer>

<script>
  const SUPABASE_URL = 'https://tbveeaupcmpltncjwfgt.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_z5uS2VpSMnOHFmQV49yEZQ_WZBB0VoD';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const params = new URLSearchParams(window.location.search);
  const handleParam = params.get('u');
  const idParam    = params.get('id');

  async function init() {
    const main = document.getElementById('main');

    if (!handleParam && !idParam) {
      main.innerHTML = notFoundHtml('Corredor não encontrado', 'Verifique o link e tente novamente.');
      return;
    }

    // Buscar corredor
    let query = sb.from('corredores').select('id, nome, cidade, sexo, instagram, assinante, assinante_desde');
    if (handleParam) query = query.ilike('instagram', handleParam);
    else              query = query.eq('id', idParam);

    const { data: corredores, error } = await query.limit(1);
    if (error || !corredores || corredores.length === 0) {
      main.innerHTML = notFoundHtml('Corredor não encontrado', 'Este perfil não existe ou ainda não foi cadastrado.');
      return;
    }

    const c = corredores[0];

    // Buscar config (temporada atual)
    const { data: cfg } = await sb.from('config').select('value').eq('key', 'temporada_atual').single();
    const temporadaAtual = cfg?.value || 'Temporada 2026';

    // Buscar resultados aprovados
    const { data: resultados } = await sb
      .from('resultados')
      .select('pontos, distancia, temporada, status, eventos(nome, data, distancia)')
      .eq('corredor_id', c.id)
      .eq('status', 'aprovado')
      .order('eventos(data)', { ascending: false });

    const aprovados = resultados || [];
    const totalPontos = aprovados.reduce((s, r) => s + (r.pontos || 0), 0);
    const totalEventos = aprovados.length;

    // Buscar posição no ranking
    const { data: rankingData } = await sb
      .from('ranking_geral')
      .select('posicao, total_pontos')
      .eq('id', c.id)
      .single();
    const posicao = rankingData?.posicao || null;

    // Montar URL de compartilhamento
    const shareUrl = c.instagram
      ? `${location.origin}/corredor.html?u=${c.instagram}`
      : `${location.origin}/corredor.html?id=${c.id}`;

    // Iniciais para avatar
    const partes = (c.nome || '?').split(' ');
    const iniciais = partes.length >= 2
      ? partes[0][0] + partes[partes.length - 1][0]
      : partes[0][0];
    const primeiroNome = partes[0];

    // Histórico HTML
    let historicoHtml = '';
    if (aprovados.length === 0) {
      historicoHtml = '<div class="empty-hist">Nenhuma corrida aprovada ainda.</div>';
    } else {
      historicoHtml = `<table class="historico-table">
        <thead><tr>
          <th>Evento</th>
          <th>Distância</th>
          <th>Pontos</th>
        </tr></thead>
        <tbody>
          ${aprovados.map(r => {
            const ev = r.eventos || {};
            const dataFmt = ev.data ? new Date(ev.data + 'T12:00:00').toLocaleDateString('pt-BR') : '—';
            const dist = r.distancia || ev.distancia || '—';
            return `<tr>
              <td>
                <div class="ev-nome">${ev.nome || '—'}</div>
                <div class="ev-data">${dataFmt}</div>
              </td>
              <td><span class="ev-dist">${dist}</span></td>
              <td><span class="pts-badge">${r.pontos || 0} pt${r.pontos !== 1 ? 's' : ''}</span></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>`;
    }

    const posStr = posicao ? `${posicao}º` : '—';
    const posLabel = posicao === 1 ? '🥇' : posicao === 2 ? '🥈' : posicao === 3 ? '🥉' : posStr;

    // Atualizar meta tags OG
    document.title = `${primeiroNome} — Circuito Agenda Run`;
    document.querySelector('meta[property="og:title"]').content = `${primeiroNome} no Circuito Agenda Run`;
    document.querySelector('meta[property="og:description"]').content = `${totalEventos} corrida${totalEventos !== 1 ? 's' : ''} · ${totalPontos} pt${totalPontos !== 1 ? 's' : ''} · ${temporadaAtual}`;

    main.innerHTML = `
      <div class="perfil-hero">
        <div class="avatar">${iniciais.toUpperCase()}</div>
        <div class="perfil-info">
          <div class="perfil-nome">${c.nome || primeiroNome}</div>
          ${c.cidade ? `<div class="perfil-cidade">📍 ${c.cidade}</div>` : ''}
          ${c.instagram ? `<div class="perfil-instagram"><a href="https://instagram.com/${c.instagram}" target="_blank">@${c.instagram}</a></div>` : ''}
          <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; align-items:center;">
            <span class="temporada-badge">${temporadaAtual}</span>
            ${renderSelo(c.assinante, c.assinante_desde)}
          </div>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-num destaque">${posLabel}</div>
          <div class="stat-label">Posição no ranking</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">${totalPontos}</div>
          <div class="stat-label">Pontos na temporada</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">${totalEventos}</div>
          <div class="stat-label">Corrida${totalEventos !== 1 ? 's' : ''} pontuada${totalEventos !== 1 ? 's' : ''}</div>
        </div>
      </div>

      <div class="share-box">
        <p>Compartilhe seu perfil e mostre onde você está no <strong>ranking da Grande SP</strong>.</p>
        <div>
          <button class="btn-share" onclick="compartilhar('${shareUrl}')">📤 Copiar link</button>
          <div class="share-ok" id="shareOk">✅ Link copiado!</div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h3>🏁 Corridas pontuadas</h3>
          <span style="font-size:12px; color:#aaa;">${totalEventos} evento${totalEventos !== 1 ? 's' : ''}</span>
        </div>
        ${historicoHtml}
      </div>
    `;
  }

  function calcularNivel(assinante_desde) {
    if (!assinante_desde) return 0;
    const inicio = new Date(assinante_desde + 'T12:00:00');
    const meses = Math.floor((new Date() - inicio) / (1000 * 60 * 60 * 24 * 30.44)) + 1;
    return Math.max(meses, 1);
  }

  function renderSelo(assinante, assinante_desde) {
    if (!assinante || !assinante_desde) return '';
    const nivel = calcularNivel(assinante_desde);
    if (nivel >= 13) {
      return `<span class="selo-assinante selo-elite">💎 Elite <span style="letter-spacing:1px;font-size:10px;">●●●●</span></span>`;
    }
    let tier, step, icon, cls;
    if (nivel <= 4)      { tier = 'Bronze'; step = nivel;     icon = '🥉'; cls = 'selo-bronze'; }
    else if (nivel <= 8) { tier = 'Prata';  step = nivel - 4; icon = '🥈'; cls = 'selo-prata';  }
    else                 { tier = 'Ouro';   step = nivel - 8; icon = '🥇'; cls = 'selo-ouro';   }
    const dots = Array.from({length: 4}, (_, i) => i < step ? '●' : '○').join('');
    return `<span class="selo-assinante ${cls}">${icon} ${tier} <span style="letter-spacing:1px;font-size:10px;">${dots}</span></span>`;
  }

  function compartilhar(url) {
    navigator.clipboard.writeText(url).then(() => {
      const ok = document.getElementById('shareOk');
      if (ok) { ok.style.display = 'block'; setTimeout(() => { ok.style.display = 'none'; }, 3000); }
    }).catch(() => {
      prompt('Copie o link abaixo:', url);
    });
  }

  function notFoundHtml(titulo, msg) {
    return `<div class="not-found">
      <h2>${titulo}</h2>
      <p>${msg}</p>
      <a href="ranking.html">← Ver ranking geral</a>
    </div>`;
  }

  init();
</script>
</body>
</html>
