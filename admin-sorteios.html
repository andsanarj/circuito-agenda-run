<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sorteios — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter','Segoe UI',sans-serif; background:#f0f4f8; min-height:100vh; }
    h1,h2,h3 { font-family:'Barlow Condensed',sans-serif; }
    header { background:#0F2D4A; padding:16px 24px; display:flex; align-items:center; justify-content:space-between; gap:12px; border-bottom:3px solid #E8622A; }
    header .logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
    header .logo img { height:36px; }
    header .logo span { color:#fff; font-weight:700; font-size:15px; }
    .badge-admin { background:#E8622A; color:#fff; font-size:11px; font-weight:700; padding:4px 10px; border-radius:4px; text-transform:uppercase; }
    .btn-sair { background:rgba(255,255,255,0.15); color:#fff; border:none; padding:7px 14px; border-radius:20px; font-size:13px; cursor:pointer; }
    .btn-voltar { color:#fff; font-size:13px; font-weight:600; text-decoration:none; background:rgba(255,255,255,0.1); padding:7px 14px; border-radius:20px; }
    .container { max-width:1000px; margin:32px auto; padding:0 20px; }
    .card { background:#fff; border-radius:12px; padding:28px; box-shadow:0 2px 12px rgba(0,0,0,0.07); margin-bottom:24px; }
    .card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; padding-bottom:12px; border-bottom:2px solid #f0f0f0; flex-wrap:wrap; gap:10px; }
    h2 { font-size:22px; color:#1F4E79; }
    label { display:block; font-size:12px; color:#666; font-weight:600; margin-bottom:5px; text-transform:uppercase; letter-spacing:0.3px; }
    input,select,textarea { width:100%; padding:9px 12px; border:1px solid #ddd; border-radius:8px; font-size:13px; font-family:inherit; }
    input:focus,select:focus,textarea:focus { outline:none; border-color:#1F4E79; box-shadow:0 0 0 3px rgba(31,78,121,0.08); }
    textarea { min-height:60px; resize:vertical; }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .form-grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }
    @media(max-width:640px){ .form-grid,.form-grid-3{ grid-template-columns:1fr; } }
    .btn { padding:9px 18px; border:none; border-radius:8px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; }
    .btn-primary { background:#1F4E79; color:#fff; }
    .btn-primary:hover { background:#163a5f; }
    .btn-orange { background:#E8622A; color:#fff; }
    .btn-orange:hover { background:#c94f1f; }
    .btn-gray { background:#f0f4f8; color:#444; border:1px solid #ddd; }
    .btn-gray:hover { background:#e2e8f0; }
    .btn-red { background:#fdecea; color:#b00020; border:1px solid #f5c6c6; }
    .btn-red:hover { background:#fbd5d2; }
    .btn-sm { padding:5px 12px; font-size:12px; }
    .btn:disabled { opacity:0.5; cursor:not-allowed; }
    .msg { padding:10px 14px; border-radius:8px; font-size:13px; margin-top:10px; display:none; }
    .msg.success { background:#e6f9f0; color:#1a7a4a; display:block; }
    .msg.error { background:#fdecea; color:#b00020; display:block; }
    .empty { text-align:center; color:#bbb; padding:32px; font-size:14px; }

    /* Cards de sorteio */
    .sorteio-card { border:1px solid #e8edf2; border-radius:10px; margin-bottom:14px; overflow:hidden; }
    .sorteio-head { display:grid; grid-template-columns:1fr auto; gap:12px; align-items:start; padding:16px 20px; }
    .sorteio-titulo { font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:800; color:#1F4E79; }
    .sorteio-premio { font-size:13px; color:#E8622A; font-weight:700; margin-top:2px; }
    .sorteio-meta { font-size:12px; color:#888; margin-top:4px; display:flex; gap:12px; flex-wrap:wrap; }
    .sorteio-body { border-top:1px solid #f0f0f0; background:#fafbfc; padding:16px 20px; }
    .inscritos-lista { font-size:13px; color:#444; line-height:1.8; }
    .badge-nivel { display:inline-block; font-size:10px; font-weight:700; padding:2px 8px; border-radius:10px; }
    .badge-todos   { background:#e8f4fd; color:#1F4E79; }
    .badge-bronze  { background:#e8d5b7; color:#6b4c1e; }
    .badge-prata   { background:#d8e8f0; color:#1F4E79; }
    .badge-ouro    { background:#fff3c0; color:#7a5800; }
    .badge-elite   { background:#b8f0ff; color:#0a3d47; }
    .status-aberto    { background:#e6f9f0; color:#1a7a4a; font-size:11px; font-weight:700; padding:3px 10px; border-radius:12px; display:inline-block; }
    .status-encerrado { background:#f0f0f0; color:#888; font-size:11px; font-weight:700; padding:3px 10px; border-radius:12px; display:inline-block; }
    .ganhador-box { background:linear-gradient(135deg,#fff3c0,#ffe066); border-radius:8px; padding:12px 16px; margin-top:12px; font-size:13px; font-weight:700; color:#7a5800; }
    .acoes-sorteio { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }

    /* Painel de edição inline */
    .edit-panel { border-top:2px solid #e8edf2; background:#fff; padding:20px; display:none; }
    .edit-panel.aberto { display:block; }
    .edit-panel h4 { font-family:'Barlow Condensed',sans-serif; font-size:16px; color:#1F4E79; margin-bottom:14px; }

    /* Modal de sorteio */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:1000; align-items:center; justify-content:center; padding:20px; }
    .modal-overlay.aberto { display:flex; }
    .modal-box { background:#fff; border-radius:14px; width:100%; max-width:520px; box-shadow:0 12px 48px rgba(0,0,0,0.25); overflow:hidden; max-height:90vh; display:flex; flex-direction:column; }
    .modal-header { background:#1F4E79; color:#fff; padding:18px 22px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .modal-header h3 { font-size:20px; font-family:'Barlow Condensed',sans-serif; }
    .modal-fechar { background:none; border:none; color:#fff; font-size:22px; cursor:pointer; line-height:1; padding:0 2px; }
    .modal-body { padding:22px; overflow-y:auto; flex:1; }
    .modal-footer { padding:16px 22px; border-top:1px solid #eee; display:flex; gap:10px; justify-content:flex-end; flex-shrink:0; }
    .sorteio-config { display:flex; align-items:flex-end; gap:12px; padding:16px; background:#f0f4f8; border-radius:10px; margin-bottom:20px; flex-wrap:wrap; }
    .sorteio-config > div { flex:1; min-width:120px; }
    .sorteio-config label { display:block; font-size:11px; font-weight:700; color:#666; text-transform:uppercase; margin-bottom:5px; }
    .sorteio-config input[type=number] { padding:9px 12px; border:1px solid #ddd; border-radius:8px; font-size:14px; font-weight:700; width:100%; font-family:inherit; }
    .info-inscritos { font-size:13px; color:#888; padding-top:2px; }
    .info-inscritos strong { color:#1F4E79; }
    .btn-sortear { background:#E8622A; color:#fff; border:none; padding:10px 20px; border-radius:8px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; white-space:nowrap; flex-shrink:0; }
    .btn-sortear:hover { background:#c94f1f; }
    .resultado-lista { }
    .resultado-item { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid #f0f0f0; }
    .resultado-item:last-child { border-bottom:none; }
    .resultado-pos { width:32px; height:32px; background:linear-gradient(135deg,#fff3c0,#ffe066); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800; color:#7a5800; flex-shrink:0; }
    .resultado-info { flex:1; }
    .resultado-nome { font-size:14px; font-weight:700; color:#1F4E79; }
    .resultado-email { font-size:12px; color:#aaa; }
    .resultado-insta { font-size:12px; color:#E8622A; font-weight:600; }
    .resultado-item.marcado { background:#fff5f5; border-radius:8px; border:1px solid #f5c6c6; padding:8px; margin:-4px 0; }
    .btn-toggle-desc { border:1px solid #ddd; background:#f7f9fb; color:#666; padding:5px 12px; border-radius:6px; font-size:12px; font-weight:700; cursor:pointer; white-space:nowrap; font-family:inherit; transition:all 0.15s; }
    .btn-toggle-desc:hover { background:#fdecea; color:#b00020; border-color:#f5c6c6; }
    .btn-toggle-desc.marcado { background:#fdecea; color:#b00020; border-color:#f5c6c6; }
    .btn-toggle-desc.marcado:hover { background:#e6f9f0; color:#1a7a4a; border-color:#a3e0c0; }
    .btn-ressortear { background:#1F4E79; color:#fff; border:none; padding:9px 18px; border-radius:8px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; margin-top:14px; width:100%; }
    .btn-ressortear:hover { background:#163a5f; }
    .aviso-pool { font-size:12px; color:#888; text-align:center; padding:10px; background:#fff8e1; border-radius:8px; margin-top:12px; }
    .desconsiderados-lista { margin-top:14px; padding:12px 16px; background:#fafbfc; border:1px solid #eee; border-radius:8px; font-size:12px; color:#aaa; }
    .desconsiderados-lista strong { color:#888; display:block; margin-bottom:6px; font-size:11px; text-transform:uppercase; }

    footer { text-align:center; padding:24px; color:#999; font-size:13px; }
  </style>
</head>
<body>
<header>
  <a href="index.html" class="logo">
    <img src="logo.png" alt="Agenda Run">
    <span>Circuito Agenda Run</span>
  </a>
  <div style="display:flex; align-items:center; gap:12px;">
    <span class="badge-admin">⚙️ Admin</span>
    <a href="admin.html" class="btn-voltar">← Painel</a>
    <button class="btn-sair" onclick="sair()">Sair</button>
  </div>
</header>

<div id="telaAcesso" style="text-align:center;padding:80px 20px;"><p style="color:#888;">Verificando acesso...</p></div>

<div id="conteudo" style="display:none;">
<div class="container">

  <!-- Criar sorteio -->
  <div class="card">
    <div class="card-header">
      <h2>🎰 Criar Sorteio</h2>
    </div>
    <div class="form-grid">
      <div>
        <label>Título *</label>
        <input type="text" id="novoTitulo" placeholder="Ex: Sorteio de Julho">
      </div>
      <div>
        <label>Prêmio *</label>
        <input type="text" id="novoPremio" placeholder="Ex: Cortesia Hello Kitty Fun Run">
      </div>
      <div>
        <label>Nível mínimo</label>
        <select id="novoNivel">
          <option value="todos">Todos os assinantes</option>
          <option value="bronze">Bronze ou superior</option>
          <option value="prata">Prata ou superior</option>
          <option value="ouro">Ouro ou superior</option>
          <option value="elite">Apenas Elite</option>
        </select>
      </div>
      <div>
        <label>Data do evento</label>
        <input type="date" id="novaDataEvento">
      </div>
      <div>
        <label>Local do evento</label>
        <input type="text" id="novoLocal" placeholder="Ex: Parque Villa-Lobos — SP">
      </div>
      <div>
        <label>Data do sorteio</label>
        <input type="date" id="novaDataSorteio">
      </div>
    </div>
    <div style="margin-top:14px;">
      <label>Descrição (opcional)</label>
      <textarea id="novaDesc" placeholder="Detalhes sobre o prêmio ou regras adicionais..."></textarea>
    </div>
    <div style="margin-top:16px;">
      <button class="btn btn-primary" onclick="criarSorteio()" id="btnCriar">+ Criar Sorteio</button>
      <div class="msg" id="msgCriar"></div>
    </div>
  </div>

  <!-- Lista de sorteios -->
  <div class="card">
    <div class="card-header">
      <h2>🎁 Sorteios</h2>
      <button class="btn btn-gray btn-sm" onclick="carregarSorteios()">🔄 Atualizar</button>
    </div>
    <div id="listaSorteios"><div class="empty">Carregando...</div></div>
  </div>

</div>
</div>

<!-- Modal de Sorteio -->
<div class="modal-overlay" id="modalSorteio" onclick="fecharModalFora(event)">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modalSorteioTitulo">🎰 Realizar Sorteio</h3>
      <button class="modal-fechar" onclick="fecharModalSorteio()">✕</button>
    </div>
    <div class="modal-body">

      <div class="sorteio-config">
        <div>
          <label>Nº de ganhadores</label>
          <input type="number" id="sorteioQtd" value="1" min="1" max="999">
        </div>
        <div>
          <div class="info-inscritos">
            <strong id="sorteioTotalInscritos">0</strong> inscritos disponíveis
          </div>
        </div>
        <button class="btn-sortear" onclick="executarSorteio()">🎲 Sortear</button>
      </div>

      <div id="sorteioResultado"></div>

    </div>
    <div class="modal-footer">
      <button class="btn btn-gray" onclick="fecharModalSorteio()">Cancelar</button>
      <button class="btn btn-orange" id="btnConfirmarSorteio" style="display:none;" onclick="confirmarSorteio()">🏆 Confirmar Ganhadores</button>
    </div>
  </div>
</div>

<footer>Circuito Agenda Run · Painel Administrativo</footer>

<script>
  const SUPABASE_URL = 'https://tbveeaupcmpltncjwfgt.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_z5uS2VpSMnOHFmQV49yEZQ_WZBB0VoD';
  const ADMIN_EMAIL  = 'agendarun1@gmail.com';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  sb.auth.getSession().then(async ({ data: { session } }) => {
    if (!session || session.user.email !== ADMIN_EMAIL) {
      document.getElementById('telaAcesso').innerHTML = `<h2 style="color:#b00020;">🔒 Acesso Negado</h2><p style="margin:12px 0;"><a href="login.html" style="color:#1F4E79;font-weight:700;">Fazer login</a></p>`;
      return;
    }
    document.getElementById('telaAcesso').style.display = 'none';
    document.getElementById('conteudo').style.display = 'block';
    carregarSorteios();
  });

  async function sair() { await sb.auth.signOut(); window.location.href = 'login.html'; }

  const nivelLabel = {
    todos: 'Todos os assinantes', bronze: 'Bronze ou superior',
    prata: 'Prata ou superior', ouro: 'Ouro ou superior', elite: 'Apenas Elite'
  };
  const nivelBadge = {
    todos: 'badge-todos', bronze: 'badge-bronze',
    prata: 'badge-prata', ouro: 'badge-ouro', elite: 'badge-elite'
  };

  const fmt = d => d ? new Date(d + 'T12:00:00').toLocaleDateString('pt-BR') : '—';

  // ── Criar ──────────────────────────────────────────────────────
  async function criarSorteio() {
    const titulo      = document.getElementById('novoTitulo').value.trim();
    const premio      = document.getElementById('novoPremio').value.trim();
    const nivel       = document.getElementById('novoNivel').value;
    const dataEvento  = document.getElementById('novaDataEvento').value || null;
    const local       = document.getElementById('novoLocal').value.trim() || null;
    const dataSorteio = document.getElementById('novaDataSorteio').value || null;
    const desc        = document.getElementById('novaDesc').value.trim() || null;
    const msg         = document.getElementById('msgCriar');
    const btn         = document.getElementById('btnCriar');

    if (!titulo || !premio) { msg.textContent = 'Título e prêmio são obrigatórios.'; msg.className = 'msg error'; return; }
    btn.disabled = true; btn.textContent = 'Salvando...';

    const { error } = await sb.from('sorteios').insert([{
      titulo, premio, nivel_minimo: nivel,
      data_evento: dataEvento, local,
      data_sorteio: dataSorteio, descricao: desc
    }]);

    btn.disabled = false; btn.textContent = '+ Criar Sorteio';
    if (error) { msg.textContent = 'Erro: ' + error.message; msg.className = 'msg error'; return; }

    msg.textContent = '✅ Sorteio criado!'; msg.className = 'msg success';
    ['novoTitulo','novoPremio','novaDataEvento','novoLocal','novaDataSorteio','novaDesc'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('novoNivel').value = 'todos';
    setTimeout(() => msg.className = 'msg', 3000);
    carregarSorteios();
  }

  // ── Carregar lista ─────────────────────────────────────────────
  async function carregarSorteios() {
    document.getElementById('listaSorteios').innerHTML = '<div class="empty">Carregando...</div>';

    const { data: sorteios } = await sb.from('sorteios')
      .select('*, ganhador:ganhador_id(nome)')
      .order('created_at', { ascending: false });

    if (!sorteios?.length) {
      document.getElementById('listaSorteios').innerHTML = '<div class="empty">Nenhum sorteio criado ainda.</div>';
      return;
    }

    const { data: inscricoes } = await sb.from('sorteio_inscricoes')
      .select('sorteio_id, corredor_id, corredores(nome, email)');

    const inscMap = {};
    (inscricoes || []).forEach(i => {
      if (!inscMap[i.sorteio_id]) inscMap[i.sorteio_id] = [];
      inscMap[i.sorteio_id].push(i);
    });

    document.getElementById('listaSorteios').innerHTML = sorteios.map(s => renderSorteioCard(s, inscMap[s.id] || [])).join('');
  }

  function renderSorteioCard(s, inscs) {
    const statusHtml = s.status === 'aberto'
      ? '<span class="status-aberto">🟢 Aberto</span>'
      : '<span class="status-encerrado">⚫ Encerrado</span>';

    let ganhadorBox = '';
    if (s.ganhadores && s.ganhadores.length > 0) {
      ganhadorBox = `<div class="ganhador-box">🏆 Ganhador${s.ganhadores.length > 1 ? 'es' : ''}: <strong>${s.ganhadores.map(g => g.nome).join(', ')}</strong></div>`;
    } else if (s.ganhador) {
      ganhadorBox = `<div class="ganhador-box">🏆 Ganhador: <strong>${s.ganhador.nome}</strong></div>`;
    }

    const inscritosHtml = inscs.length
      ? `<div class="inscritos-lista">${inscs.map((i,n) => `${n+1}. ${i.corredores?.nome || '?'} <span style="color:#aaa;font-size:11px;">${i.corredores?.email || ''}</span>`).join('<br>')}</div>`
      : '<div style="font-size:12px;color:#bbb;">Nenhum inscrito ainda.</div>';

    const btnSortear = s.status === 'aberto' && inscs.length > 0
      ? `<button class="btn btn-orange btn-sm" onclick="abrirModalSorteio('${s.id}', '${esc(s.titulo)}', ${inscs.length})">🎰 Realizar Sorteio</button>`
      : '';
    const btnEncerrar = s.status === 'aberto'
      ? `<button class="btn btn-gray btn-sm" onclick="encerrarSorteio('${s.id}')">Encerrar</button>`
      : '';
    const btnEditar = s.status === 'aberto'
      ? `<button class="btn btn-gray btn-sm" onclick="toggleEditar('${s.id}')">✏️ Editar</button>`
      : '';

    const localHtml = s.local ? `<span>📍 ${s.local}</span>` : '';
    const dataEv    = s.data_evento  ? `<span>🏃 Evento: ${fmt(s.data_evento)}</span>` : '';
    const dataSor   = s.data_sorteio ? `<span>🎰 Sorteio: ${fmt(s.data_sorteio)}</span>` : '';

    const editPanel = `
      <div class="edit-panel" id="edit-${s.id}">
        <h4>✏️ Editar Sorteio</h4>
        <div class="form-grid" style="margin-bottom:14px;">
          <div>
            <label>Título *</label>
            <input type="text" id="e-titulo-${s.id}" value="${esc(s.titulo)}">
          </div>
          <div>
            <label>Prêmio *</label>
            <input type="text" id="e-premio-${s.id}" value="${esc(s.premio)}">
          </div>
          <div>
            <label>Nível mínimo</label>
            <select id="e-nivel-${s.id}">
              ${['todos','bronze','prata','ouro','elite'].map(v =>
                `<option value="${v}" ${s.nivel_minimo===v?'selected':''}>${nivelLabel[v]}</option>`
              ).join('')}
            </select>
          </div>
          <div>
            <label>Data do evento</label>
            <input type="date" id="e-data-evento-${s.id}" value="${s.data_evento || ''}">
          </div>
          <div>
            <label>Local do evento</label>
            <input type="text" id="e-local-${s.id}" value="${esc(s.local || '')}" placeholder="Ex: Parque Villa-Lobos — SP">
          </div>
          <div>
            <label>Data do sorteio</label>
            <input type="date" id="e-data-sorteio-${s.id}" value="${s.data_sorteio || ''}">
          </div>
        </div>
        <div style="margin-bottom:14px;">
          <label>Descrição</label>
          <textarea id="e-desc-${s.id}">${esc(s.descricao || '')}</textarea>
        </div>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          <button class="btn btn-primary btn-sm" onclick="salvarEdicao('${s.id}')">💾 Salvar</button>
          <button class="btn btn-gray btn-sm" onclick="toggleEditar('${s.id}')">Cancelar</button>
        </div>
        <div class="msg" id="msg-edit-${s.id}"></div>
      </div>`;

    return `
      <div class="sorteio-card" id="card-${s.id}">
        <div class="sorteio-head">
          <div>
            <div class="sorteio-titulo">${s.titulo}</div>
            <div class="sorteio-premio">🎁 ${s.premio}</div>
            <div class="sorteio-meta">
              <span>${statusHtml}</span>
              <span><span class="badge-nivel ${nivelBadge[s.nivel_minimo]}">${nivelLabel[s.nivel_minimo]}</span></span>
              ${dataEv}${localHtml}${dataSor}
              <span>👥 ${inscs.length} inscrito${inscs.length !== 1 ? 's' : ''}</span>
            </div>
            ${s.descricao ? `<div style="font-size:12px;color:#888;margin-top:6px;">${s.descricao}</div>` : ''}
          </div>
        </div>
        <div class="sorteio-body">
          <div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;margin-bottom:8px;">Inscritos</div>
          ${inscritosHtml}
          ${ganhadorBox}
          <div class="acoes-sorteio">${btnEditar}${btnSortear}${btnEncerrar}</div>
        </div>
        ${editPanel}
      </div>`;
  }

  function esc(str) {
    return String(str || '').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // ── Editar ─────────────────────────────────────────────────────
  function toggleEditar(id) {
    const panel = document.getElementById('edit-' + id);
    panel.classList.toggle('aberto');
  }

  async function salvarEdicao(id) {
    const titulo      = document.getElementById(`e-titulo-${id}`).value.trim();
    const premio      = document.getElementById(`e-premio-${id}`).value.trim();
    const nivel       = document.getElementById(`e-nivel-${id}`).value;
    const dataEvento  = document.getElementById(`e-data-evento-${id}`).value || null;
    const local       = document.getElementById(`e-local-${id}`).value.trim() || null;
    const dataSorteio = document.getElementById(`e-data-sorteio-${id}`).value || null;
    const desc        = document.getElementById(`e-desc-${id}`).value.trim() || null;
    const msg         = document.getElementById(`msg-edit-${id}`);

    if (!titulo || !premio) { msg.textContent = 'Título e prêmio são obrigatórios.'; msg.className = 'msg error'; return; }

    const { error } = await sb.from('sorteios').update({
      titulo, premio, nivel_minimo: nivel,
      data_evento: dataEvento, local,
      data_sorteio: dataSorteio, descricao: desc
    }).eq('id', id);

    if (error) { msg.textContent = 'Erro: ' + error.message; msg.className = 'msg error'; return; }

    msg.textContent = '✅ Salvo!'; msg.className = 'msg success';
    setTimeout(() => carregarSorteios(), 1000);
  }

  // ── Modal de Sorteio ───────────────────────────────────────────
  let sorteioModalId = null;
  let sorteioPool = [];          // [{id, nome, email, instagram}] todos os inscritos
  let sorteioGanhadores = [];    // [{id, nome, email, instagram}] sorteados atualmente
  let sorteioDesconsiderados = new Set(); // IDs permanentemente excluídos (já substituídos)
  let sorteioMarcados = new Set();        // índices marcados para ressortear

  async function abrirModalSorteio(id, titulo, numInscs) {
    sorteioModalId = id;
    sorteioGanhadores = [];
    sorteioDesconsiderados = new Set();

    document.getElementById('modalSorteioTitulo').textContent = '🎰 ' + titulo;
    document.getElementById('sorteioTotalInscritos').textContent = numInscs;
    document.getElementById('sorteioQtd').value = 1;
    document.getElementById('sorteioQtd').max = numInscs;
    document.getElementById('sorteioResultado').innerHTML = '';
    document.getElementById('btnConfirmarSorteio').style.display = 'none';
    document.getElementById('modalSorteio').classList.add('aberto');

    const { data } = await sb.from('sorteio_inscricoes')
      .select('corredor_id, corredores(nome, email, instagram)').eq('sorteio_id', id);
    sorteioPool = (data || []).map(i => ({
      id: i.corredor_id,
      nome: i.corredores?.nome || '?',
      email: i.corredores?.email || '',
      instagram: i.corredores?.instagram || ''
    }));
    document.getElementById('sorteioTotalInscritos').textContent = sorteioPool.length;
    document.getElementById('sorteioQtd').max = sorteioPool.length;
  }

  function fecharModalSorteio() {
    document.getElementById('modalSorteio').classList.remove('aberto');
  }
  function fecharModalFora(e) {
    if (e.target === document.getElementById('modalSorteio')) fecharModalSorteio();
  }

  function executarSorteio() {
    const qtd = Math.max(1, parseInt(document.getElementById('sorteioQtd').value) || 1);
    const disponiveis = sorteioPool.filter(p => !sorteioDesconsiderados.has(p.id));

    if (qtd > disponiveis.length) {
      alert(`Só há ${disponiveis.length} participante(s) disponível(is) para sortear.`);
      return;
    }

    sorteioMarcados = new Set();
    const embaralhados = [...disponiveis].sort(() => Math.random() - 0.5);
    sorteioGanhadores = embaralhados.slice(0, qtd);
    renderResultado();
    document.getElementById('btnConfirmarSorteio').style.display = 'inline-block';
  }

  function toggleMarcado(idx) {
    if (sorteioMarcados.has(idx)) {
      sorteioMarcados.delete(idx);
    } else {
      sorteioMarcados.add(idx);
    }
    renderResultado();
  }

  function sortearNovamenteMarcados() {
    if (sorteioMarcados.size === 0) return;

    // Desconsiderar permanentemente os marcados
    sorteioMarcados.forEach(idx => {
      sorteioDesconsiderados.add(sorteioGanhadores[idx].id);
    });

    // Substituir cada marcado por um novo sorteado
    const semSubstituto = [];
    const indicesMarcados = [...sorteioMarcados].sort((a, b) => a - b);

    indicesMarcados.forEach(idx => {
      // Pool: exclui todos os ganhadores atuais (exceto o slot sendo substituído) + desconsiderados
      const usados = new Set([
        ...sorteioGanhadores.filter((_, i) => i !== idx).map(g => g.id),
        ...sorteioDesconsiderados
      ]);
      const disponiveis = sorteioPool.filter(p => !usados.has(p.id));

      if (disponiveis.length === 0) {
        semSubstituto.push(idx);
      } else {
        const novo = disponiveis[Math.floor(Math.random() * disponiveis.length)];
        sorteioGanhadores[idx] = novo;
      }
    });

    // Remove slots sem substituto (do fim para o início para não deslocar índices)
    semSubstituto.sort((a, b) => b - a).forEach(idx => sorteioGanhadores.splice(idx, 1));

    sorteioMarcados = new Set();

    if (sorteioGanhadores.length === 0) {
      document.getElementById('btnConfirmarSorteio').style.display = 'none';
    }

    renderResultado();

    if (semSubstituto.length > 0) {
      alert(`⚠️ ${semSubstituto.length} slot(s) não puderam ser preenchidos — pool esgotado.`);
    }
  }

  function renderResultado() {
    const descList = [...sorteioDesconsiderados].map(id => {
      const p = sorteioPool.find(x => x.id === id);
      return p ? p.nome : id;
    });

    const temMarcados = sorteioMarcados.size > 0;
    const poolLivre = sorteioPool.filter(p =>
      !sorteioDesconsiderados.has(p.id) && !sorteioGanhadores.find(g => g.id === p.id)
    ).length;

    document.getElementById('sorteioResultado').innerHTML = `
      <div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;margin-bottom:12px;">
        Resultado — ${sorteioGanhadores.length} ganhador${sorteioGanhadores.length !== 1 ? 'es' : ''}
        ${temMarcados ? `<span style="color:#b00020;margin-left:8px;">(${sorteioMarcados.size} marcado${sorteioMarcados.size > 1 ? 's' : ''} para ressortear)</span>` : ''}
      </div>
      <div class="resultado-lista">
        ${sorteioGanhadores.map((g, i) => {
          const marcado = sorteioMarcados.has(i);
          return `
          <div class="resultado-item${marcado ? ' marcado' : ''}">
            <div class="resultado-pos" style="${marcado ? 'opacity:0.4;' : ''}">${i + 1}º</div>
            <div class="resultado-info" style="${marcado ? 'opacity:0.5;' : ''}">
              <div class="resultado-nome">${g.nome}</div>
              ${g.instagram ? `<div class="resultado-insta">@${g.instagram}</div>` : ''}
              <div class="resultado-email">${g.email}</div>
            </div>
            <button class="btn-toggle-desc${marcado ? ' marcado' : ''}" onclick="toggleMarcado(${i})">
              ${marcado ? '↩ Manter' : '✕ Desconsiderar'}
            </button>
          </div>`;
        }).join('')}
      </div>
      ${temMarcados && poolLivre > 0 ? `
        <button class="btn-ressortear" onclick="sortearNovamenteMarcados()">
          🔄 Sortear novamente para os marcados (${sorteioMarcados.size})
        </button>
      ` : ''}
      ${temMarcados && poolLivre === 0 ? `
        <div class="aviso-pool">⚠️ Pool esgotado — não há mais participantes disponíveis para substituição.</div>
      ` : ''}
      ${descList.length > 0 ? `
        <div class="desconsiderados-lista">
          <strong>Desconsiderados nesta rodada (${descList.length})</strong>
          ${descList.join(' · ')}
        </div>
      ` : ''}
    `;
  }

  async function confirmarSorteio() {
    if (!sorteioGanhadores.length) return;
    const nomes = sorteioGanhadores.map(g => g.nome).join(', ');
    if (!confirm(`Confirmar ${sorteioGanhadores.length > 1 ? 'ganhadores' : 'ganhador'}: ${nomes}?\n\nEsta ação encerrará o sorteio e não poderá ser desfeita.`)) return;

    const { error } = await sb.from('sorteios').update({
      ganhador_id: sorteioGanhadores[0].id,
      ganhadores: sorteioGanhadores.map(g => ({ id: g.id, nome: g.nome })),
      status: 'encerrado',
      encerrado_em: new Date().toISOString()
    }).eq('id', sorteioModalId);

    if (error) { alert('Erro: ' + error.message); return; }
    fecharModalSorteio();
    carregarSorteios();
  }

  // ── Encerrar ───────────────────────────────────────────────────
  async function encerrarSorteio(id) {
    if (!confirm('Encerrar este sorteio sem realizar o sorteio?')) return;
    await sb.from('sorteios').update({ status: 'encerrado' }).eq('id', id);
    carregarSorteios();
  }
</script>
</body>
</html>
