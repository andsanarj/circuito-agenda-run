<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0F2D4A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Circuito AR">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0F2D4A; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; text-align: center; color: #fff; }

    button { background: #E8622A; color: #fff; border: none; padding: 12px 28px; border-radius: 24px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }
    button:hover { background: #c94f1f; }
  </style>
</head>
<body>
  <img src="/logo.png" alt="Circuito Agenda Run">
  <h1>Sem conexão</h1>
  <p>Você está offline. Verifique sua internet e tente novamente.</p>
  <button onclick="window.location.reload()">Tentar novamente</button>
  <script>if("serviceWorker"in navigator){navigator.serviceWorker.register("/sw.js")}</script>
