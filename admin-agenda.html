<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0F2D4A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Circuito AR">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Agenda de Eventos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; flex-direction: column; }
    h1, h2 { font-family: 'Barlow Condensed', sans-serif; }

    header { background: #0F2D4A; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; gap: 12px; border-bottom: 3px solid #E8622A; }
    header .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    header .logo img { height: 36px; }
    header .logo span { color: #fff; font-weight: 700; font-size: 15px; }
    .badge-admin { background: #E8622A; color: #fff; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 12px; text-transform: uppercase; letter-spacing: 1px; }
    .btn-sair { background: rgba(255,255,255,0.1); color: #fff; border: none; padding: 7px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; font-weight: 600; }
    .btn-sair:hover { background: rgba(255,255,255,0.2); }

    .container { max-width: 960px; margin: 28px auto; padding: 0 16px; flex: 1; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); padding: 28px; margin-bottom: 24px; }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 2px solid #f0f0f0; flex-wrap: wrap; gap: 10px; }
    .card-header h2 { font-size: 22px; color: #0F2D4A; }

    /* Formulário */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-grid .full { grid-column: 1 / -1; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group label { font-size: 12px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-group input { border: 1.5px solid #dde3ea; border-radius: 8px; padding: 9px 12px; font-size: 14px; font-family: inherit; transition: border-color 0.15s; }
    .form-group input:focus { outline: none; border-color: #1F4E79; }

    .btn { padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; font-family: inherit; transition: background 0.15s; }
    .btn-green { background: #1a7a4a; color: #fff; }
    .btn-green:hover { background: #156039; }
    .btn-gray { background: #f0f4f8; color: #555; }
    .btn-gray:hover { background: #e0e8f0; }
    .btn-red { background: #fdecea; color: #b00020; border: 1px solid #f5c6c6; }
    .btn-red:hover { background: #fbd5d2; }
    .btn-orange { background: #E8622A; color: #fff; }
    .btn-orange:hover { background: #c94f1f; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }

    /* Tabela */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th { background: #f5f8fb; padding: 10px 12px; text-align: left; font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid #e8edf2; }
    tbody td { padding: 12px 12px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #fafbfc; }
    .td-acoes { display: flex; gap: 6px; }

    /* Modal */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
    .overlay.aberto { display: flex; }
    .modal { background: #fff; border-radius: 14px; padding: 28px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; }
    .modal h3 { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; color: #0F2D4A; margin-bottom: 20px; }
    .modal-btns { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }

    .msg { font-size: 13px; margin-top: 10px; padding: 8px 12px; border-radius: 6px; display: none; }
    .msg.success { display: block; background: #e6f9f0; color: #1a7a4a; }
    .msg.error { display: block; background: #fdecea; color: #b00020; }

    .empty { text-align: center; padding: 40px; color: #aaa; }
    footer { background: #0F2D4A; color: #a8c8e8; text-align: center; padding: 16px; font-size: 13px; margin-top: auto; }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="logo">
    <img src="logo.png" alt="Agenda Run">
    <span>Circuito Agenda Run</span>
  </a>
  <div style="display:flex; align-items:center; gap:12px;">
    <span class="badge-admin">⚙️ Admin</span>
    <a href="admin.html" style="color:#fff; font-size:13px; font-weight:600; text-decoration:none; background:rgba(255,255,255,0.1); padding:7px 14px; border-radius:20px;">← Painel</a>
    <button class="btn-sair" onclick="sair()">Sair</button>
  </div>
</header>

<div id="telaAcesso" style="text-align:center; padding:80px 20px;"><p style="color:#888;">Verificando acesso...</p></div>

<div id="conteudo" style="display:none;">
<div class="container">

  <!-- Formulário de cadastro -->
  <div class="card">
    <div class="card-header">
      <h2>➕ Cadastrar novo evento</h2>
    </div>
    <div class="form-grid">
      <div class="form-group full">
        <label>Nome do evento *</label>
        <input type="text" id="fNome" placeholder="Ex: Night Run São Paulo">
      </div>
      <div class="form-group">
        <label>Data</label>
        <input type="date" id="fData">
      </div>
      <div class="form-group">
        <label>Distâncias</label>
        <input type="text" id="fDistancias" placeholder="Ex: 5K, 10K, 21K">
      </div>
      <div class="form-group">
        <label>Cidade</label>
        <input type="text" id="fCidade" placeholder="Ex: São Paulo">
      </div>
      <div class="form-group">
        <label>Cupom de desconto</label>
        <input type="text" id="fCupom" placeholder="Ex: AGENDARUN10">
      </div>
      <div class="form-group full">
        <label>Link do evento</label>
        <input type="url" id="fLink" placeholder="https://...">
      </div>
      <div class="form-group full">
        <label>Serviço de retirada de Kit Run</label>
        <input type="text" id="fKitRun" placeholder="Ex: Retirada disponível — entre em contato">
      </div>
      <div class="form-group full" style="flex-direction:row; align-items:center; gap:10px; padding:10px 12px; background:#e0f7f8; border-radius:8px;">
        <input type="checkbox" id="fCircuito" style="width:18px;height:18px;cursor:pointer;accent-color:#1a6370;">
        <label for="fCircuito" style="font-size:13px; font-weight:600; color:#1a6370; cursor:pointer; text-transform:none; letter-spacing:0;">🏅 Este evento faz parte do Circuito Agenda Run</label>
      </div>
    </div>
    <div style="margin-top:16px; display:flex; gap:10px; align-items:center;">
      <button class="btn btn-green" onclick="salvar()">✅ Salvar evento</button>
      <button class="btn btn-gray" onclick="limparForm()">Limpar</button>
    </div>
    <div id="msgCadastro" class="msg"></div>
  </div>

  <!-- Lista de eventos -->
  <div class="card">
    <div class="card-header">
      <h2>📅 Eventos cadastrados</h2>
      <button class="btn btn-gray btn-sm" onclick="carregar()">🔄 Atualizar</button>
    </div>
    <div id="tabela"><div class="empty">Carregando...</div></div>
  </div>

</div>
</div>

<!-- Modal de edição -->
<div class="overlay" id="modalOverlay">
  <div class="modal">
    <h3>✏️ Editar evento</h3>
    <input type="hidden" id="editId">
    <div class="form-grid">
      <div class="form-group full">
        <label>Nome do evento *</label>
        <input type="text" id="editNome">
      </div>
      <div class="form-group">
        <label>Data</label>
        <input type="date" id="editData">
      </div>
      <div class="form-group">
        <label>Distâncias</label>
        <input type="text" id="editDistancias">
      </div>
      <div class="form-group">
        <label>Cidade</label>
        <input type="text" id="editCidade">
      </div>
      <div class="form-group">
        <label>Cupom de desconto</label>
        <input type="text" id="editCupom">
      </div>
      <div class="form-group full">
        <label>Link do evento</label>
        <input type="url" id="editLink">
      </div>
      <div class="form-group full">
        <label>Serviço de retirada de Kit Run</label>
        <input type="text" id="editKitRun" placeholder="Ex: Retirada disponível — entre em contato">
      </div>
      <div class="form-group full" style="flex-direction:row; align-items:center; gap:10px; padding:10px 12px; background:#e0f7f8; border-radius:8px;">
        <input type="checkbox" id="editCircuito" style="width:18px;height:18px;cursor:pointer;accent-color:#1a6370;">
        <label for="editCircuito" style="font-size:13px; font-weight:600; color:#1a6370; cursor:pointer; text-transform:none; letter-spacing:0;">🏅 Este evento faz parte do Circuito Agenda Run</label>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn btn-gray" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-green" onclick="salvarEdicao()">✅ Salvar alterações</button>
    </div>
    <div id="msgEdicao" class="msg"></div>
  </div>
</div>

<footer>Circuito Agenda Run · Painel Administrativo</footer>

<script>
  const SUPABASE_URL = 'https://tbveeaupcmpltncjwfgt.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_z5uS2VpSMnOHFmQV49yEZQ_WZBB0VoD';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  const ADMIN_EMAIL = 'agendarun1@gmail.com';

  sb.auth.getSession().then(async ({ data: { session } }) => {
    if (!session || session.user.email !== ADMIN_EMAIL) {
      document.getElementById('telaAcesso').innerHTML = `<h2 style="color:#b00020;">🔒 Acesso Negado</h2><p style="margin:12px 0;"><a href="login.html" style="color:#1F4E79;font-weight:700;">Fazer login</a></p>`;
      return;
    }
    document.getElementById('telaAcesso').style.display = 'none';
    document.getElementById('conteudo').style.display = 'block';
    await carregar();
  });

  function fmt(dataStr) {
    if (!dataStr) return '—';
    return new Date(dataStr + 'T12:00:00').toLocaleDateString('pt-BR');
  }

  async function carregar() {
    const div = document.getElementById('tabela');
    const { data, error } = await sb.from('agenda_eventos').select('*').order('data', { ascending: true });
    if (error) { div.innerHTML = `<div class="empty" style="color:#b00020;">Erro: ${error.message}</div>`; return; }
    if (!data?.length) { div.innerHTML = '<div class="empty">Nenhum evento cadastrado ainda.</div>'; return; }

    let html = `<table><thead><tr>
      <th>Nome</th><th>Data</th><th>Distâncias</th><th>Cidade</th><th>Cupom</th><th>Kit Run</th><th>Ações</th>
    </tr></thead><tbody>`;
    data.forEach(ev => {
      const badgeCircuito = ev.circuito_agenda_run ? `<span style="font-size:10px;background:#e0f7f8;color:#1a6370;border:1px solid #b2e8ec;padding:1px 7px;border-radius:10px;font-weight:700;">🏅 Circuito</span> ` : '';
      html += `<tr>
        <td>${badgeCircuito}<strong>${ev.nome}</strong>${ev.link ? `<br><a href="${ev.link}" target="_blank" style="font-size:11px;color:#1F4E79;">🔗 Ver evento</a>` : ''}</td>
        <td style="white-space:nowrap;">${fmt(ev.data)}</td>
        <td>${ev.distancias || '—'}</td>
        <td>${ev.cidade || '—'}</td>
        <td>${ev.cupom_desconto ? `<strong style="color:#b07800;">${ev.cupom_desconto}</strong>` : '—'}</td>
        <td style="font-size:12px;color:#1a6b2a;">${ev.kit_run ? `📦 ${ev.kit_run}` : '—'}</td>
        <td><div class="td-acoes">
          <button class="btn btn-gray btn-sm" onclick="abrirEdicao('${ev.id}')">✏️ Editar</button>
          <button class="btn btn-red btn-sm" onclick="excluir('${ev.id}', '${ev.nome.replace(/'/g,"\\'")}')">🗑️ Excluir</button>
        </div></td>
      </tr>`;
    });
    html += '</tbody></table>';
    div.innerHTML = html;
  }

  async function salvar() {
    const nome = document.getElementById('fNome').value.trim();
    const msg = document.getElementById('msgCadastro');
    if (!nome) { msg.textContent = 'O nome do evento é obrigatório.'; msg.className = 'msg error'; return; }

    const { error } = await sb.from('agenda_eventos').insert([{
      nome,
      data: document.getElementById('fData').value || null,
      distancias: document.getElementById('fDistancias').value.trim() || null,
      cidade: document.getElementById('fCidade').value.trim() || null,
      cupom_desconto: document.getElementById('fCupom').value.trim() || null,
      link: document.getElementById('fLink').value.trim() || null,
      kit_run: document.getElementById('fKitRun').value.trim() || null,
      circuito_agenda_run: document.getElementById('fCircuito').checked,
    }]);

    if (error) { msg.textContent = 'Erro: ' + error.message; msg.className = 'msg error'; return; }
    msg.textContent = '✅ Evento cadastrado com sucesso!';
    msg.className = 'msg success';
    limparForm();
    await carregar();
  }

  function limparForm() {
    ['fNome','fData','fDistancias','fCidade','fCupom','fLink','fKitRun'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('fCircuito').checked = false;
  }

  let _eventosCache = {};

  async function abrirEdicao(id) {
    if (!_eventosCache[id]) {
      const { data } = await sb.from('agenda_eventos').select('*').eq('id', id).single();
      _eventosCache[id] = data;
    }
    const ev = _eventosCache[id];
    document.getElementById('editId').value = ev.id;
    document.getElementById('editNome').value = ev.nome || '';
    document.getElementById('editData').value = ev.data || '';
    document.getElementById('editDistancias').value = ev.distancias || '';
    document.getElementById('editCidade').value = ev.cidade || '';
    document.getElementById('editCupom').value = ev.cupom_desconto || '';
    document.getElementById('editLink').value = ev.link || '';
    document.getElementById('editKitRun').value = ev.kit_run || '';
    document.getElementById('editCircuito').checked = !!ev.circuito_agenda_run;
    document.getElementById('msgEdicao').className = 'msg';
    document.getElementById('modalOverlay').classList.add('aberto');
  }

  function fecharModal() {
    document.getElementById('modalOverlay').classList.remove('aberto');
  }

  async function salvarEdicao() {
    const id = document.getElementById('editId').value;
    const nome = document.getElementById('editNome').value.trim();
    const msg = document.getElementById('msgEdicao');
    if (!nome) { msg.textContent = 'O nome é obrigatório.'; msg.className = 'msg error'; return; }

    const { error } = await sb.from('agenda_eventos').update({
      nome,
      data: document.getElementById('editData').value || null,
      distancias: document.getElementById('editDistancias').value.trim() || null,
      cidade: document.getElementById('editCidade').value.trim() || null,
      cupom_desconto: document.getElementById('editCupom').value.trim() || null,
      link: document.getElementById('editLink').value.trim() || null,
      kit_run: document.getElementById('editKitRun').value.trim() || null,
      circuito_agenda_run: document.getElementById('editCircuito').checked,
    }).eq('id', id);

    if (error) { msg.textContent = 'Erro: ' + error.message; msg.className = 'msg error'; return; }
    delete _eventosCache[id];
    fecharModal();
    await carregar();
  }

  async function excluir(id, nome) {
    if (!confirm(`Excluir o evento "${nome}"? Esta ação não pode ser desfeita.`)) return;
    const { error } = await sb.from('agenda_eventos').delete().eq('id', id);
    if (error) { alert('Erro: ' + error.message); return; }
    await carregar();
  }

  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) fecharModal();
  });

  async function sair() { await sb.auth.signOut(); window.location.href = 'login.html'; }
</script>
  <script>if("serviceWorker"in navigator){navigator.serviceWorker.register("/sw.js")}</script>
</body>
</html>
